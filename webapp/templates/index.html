<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Custom Wordle</title>

<style>
body{
    background:#121213;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
}

h1{
    margin-bottom:20px;
}

#board{
    display:grid;
    gap:5px;
}

.row{
    display:flex;
    gap:5px;
}

.tile{
    width:60px;
    height:60px;
    border:2px solid #3a3a3c;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
    text-transform:uppercase;
}

.correct{
    background:#538d4e;
    border-color:#538d4e;
}

.present{
    background:#b59f3b;
    border-color:#b59f3b;
}

.absent{
    background:#3a3a3c;
    border-color:#3a3a3c;
}

#guessInput{
    margin-top:20px;
    padding:10px;
    font-size:22px;
    text-transform:uppercase;
    text-align:center;
}

button{
    margin-top:10px;
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

#message{
    margin-top:20px;
    font-size:24px;
}
</style>
</head>
<body>

<h1>Custom Wordle</h1>

<div id="board"></div>

<input
id="guessInput"
maxlength="5"
placeholder="Guess"
/>

<button onclick="submitGuess()">
Guess
</button>

<div id="message"></div>

<script>

// CHANGE WORDS HERE
const WORDS = [
    "APPLE",
    "HOUSE",
    "ROBOT",
    "SWORD",
    "MAGIC",
    "FLASK",
    "SPACE",
    "TIGER",
    "QUEST",
    "GHOST"
];

const SECRET =
WORDS[Math.floor(Math.random()*WORDS.length)];

const MAX_ROWS = 6;
const WORD_LENGTH = 5;

let currentRow = 0;

const board =
document.getElementById("board");

for(let r=0;r<MAX_ROWS;r++){

    const row =
    document.createElement("div");

    row.className = "row";

    for(let c=0;c<WORD_LENGTH;c++){

        const tile =
        document.createElement("div");

        tile.className = "tile";

        tile.id =
        `tile-${r}-${c}`;

        row.appendChild(tile);
    }

    board.appendChild(row);
}

function submitGuess(){

    const input =
    document.getElementById(
        "guessInput"
    );

    const guess =
    input.value.toUpperCase();

    if(
        guess.length !== WORD_LENGTH
    ){
        alert(
        "Word must be 5 letters");
        return;
    }

    for(
        let i=0;
        i<WORD_LENGTH;
        i++
    ){

        const tile =
        document.getElementById(
        `tile-${currentRow}-${i}`
        );

        tile.textContent =
        guess[i];

        if(
            guess[i] === SECRET[i]
        ){

            tile.classList.add(
                "correct"
            );

        }else if(
            SECRET.includes(
                guess[i]
            )
        ){

            tile.classList.add(
                "present"
            );

        }else{

            tile.classList.add(
                "absent"
            );
        }
    }

    if(guess === SECRET){

        document
        .getElementById("message")
        .innerHTML =
        "🎉 YOU WON!";

        input.disabled = true;
        return;
    }

    currentRow++;

    if(
        currentRow >= MAX_ROWS
    ){

        document
        .getElementById("message")
        .innerHTML =
        "💀 Word was: "
        + SECRET;

        input.disabled = true;
    }

    input.value="";
}

document
.getElementById("guessInput")
.addEventListener(
"keydown",
function(e){

    if(e.key==="Enter"){
        submitGuess();
    }
});

</script>

</body>
</html>
