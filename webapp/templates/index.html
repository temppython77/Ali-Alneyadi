<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
}

h1{
    margin-bottom:10px;
}

#score{
    font-size:24px;
    margin-bottom:15px;
}

canvas{
    background:#1b1b1b;
    border:3px solid #444;
}

#gameOver{
    margin-top:15px;
    font-size:28px;
    display:none;
}

button{
    margin-top:10px;
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
    display:none;
}
</style>
</head>
<body>

<h1>🐍 Snake</h1>

<div id="score">
Score: 0
</div>

<canvas id="game" width="600" height="600"></canvas>

<div id="gameOver">
💀 Game Over
</div>

<button id="restartBtn">
Play Again
</button>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GRID_SIZE = 20;
const TILE_COUNT = canvas.width / GRID_SIZE;

let snake;
let food;
let score;
let dx;
let dy;
let gameRunning;

function startGame(){

    snake = [
        {x:10,y:10},
        {x:9,y:10},
        {x:8,y:10}
    ];

    food = generateFood();

    score = 0;

    dx = 1;
    dy = 0;

    gameRunning = true;

    document.getElementById(
        "score"
    ).textContent =
    "Score: 0";

    document.getElementById(
        "gameOver"
    ).style.display =
    "none";

    document.getElementById(
        "restartBtn"
    ).style.display =
    "none";
}

function generateFood(){

    let position;

    while(true){

        position = {
            x: Math.floor(
                Math.random()*TILE_COUNT
            ),
            y: Math.floor(
                Math.random()*TILE_COUNT
            )
        };

        let onSnake = snake?.some(
            part =>
            part.x === position.x &&
            part.y === position.y
        );

        if(!onSnake){
            return position;
        }
    }
}

function drawTile(x,y,color){

    ctx.fillStyle = color;

    ctx.fillRect(
        x*GRID_SIZE,
        y*GRID_SIZE,
        GRID_SIZE-2,
        GRID_SIZE-2
    );
}

function update(){

    if(!gameRunning){
        return;
    }

    const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
    };

    // Wall collision

    if(
        head.x < 0 ||
        head.x >= TILE_COUNT ||
        head.y < 0 ||
        head.y >= TILE_COUNT
    ){
        endGame();
        return;
    }

    // Self collision

    for(let part of snake){

        if(
            part.x === head.x &&
            part.y === head.y
        ){
            endGame();
            return;
        }
    }

    snake.unshift(head);

    // Eat food

    if(
        head.x === food.x &&
        head.y === food.y
    ){

        score++;

        document.getElementById(
            "score"
        ).textContent =
        "Score: " + score;

        food = generateFood();

    }else{

        snake.pop();
    }
}

function draw(){

    ctx.fillStyle = "#1b1b1b";
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    // Food

    drawTile(
        food.x,
        food.y,
        "#ff4444"
    );

    // Snake

    snake.forEach((segment,index)=>{

        drawTile(
            segment.x,
            segment.y,
            index === 0
            ? "#00ff88"
            : "#00cc66"
        );
    });
}

function gameLoop(){

    update();
    draw();
}

function endGame(){

    gameRunning = false;

    document.getElementById(
        "gameOver"
    ).style.display =
    "block";

    document.getElementById(
        "restartBtn"
    ).style.display =
    "inline-block";
}

document.addEventListener(
    "keydown",
    e => {

    const key = e.key;

    if(
        (key === "ArrowUp" || key === "w" || key === "W")
        && dy !== 1
    ){
        dx = 0;
        dy = -1;
    }

    else if(
        (key === "ArrowDown" || key === "s" || key === "S")
        && dy !== -1
    ){
        dx = 0;
        dy = 1;
    }

    else if(
        (key === "ArrowLeft" || key === "a" || key === "A")
        && dx !== 1
    ){
        dx = -1;
        dy = 0;
    }

    else if(
        (key === "ArrowRight" || key === "d" || key === "D")
        && dx !== -1
    ){
        dx = 1;
        dy = 0;
    }
});

document.getElementById(
    "restartBtn"
).addEventListener(
    "click",
    startGame
);

startGame();

// 10 FPS
setInterval(
    gameLoop,
    100
);

</script>

</body>
</html>
