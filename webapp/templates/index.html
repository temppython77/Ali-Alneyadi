<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Wordle</title>

<style>
:root{
    --bg:#121213;
    --tile:#3a3a3c;
    --green:#538d4e;
    --yellow:#b59f3b;
    --gray:#3a3a3c;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
}

h1{
    margin:20px 0;
}

#message{
    height:30px;
    margin-bottom:10px;
    font-weight:bold;
}

#board{
    display:grid;
    gap:5px;
}

.row{
    display:flex;
    gap:5px;
}

.tile{
    width:62px;
    height:62px;
    border:2px solid #3a3a3c;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    font-weight:bold;
    text-transform:uppercase;
    transition:.25s;
}

.correct{
    background:var(--green);
    border-color:var(--green);
}

.present{
    background:var(--yellow);
    border-color:var(--yellow);
}

.absent{
    background:var(--gray);
    border-color:var(--gray);
}

#keyboard{
    margin-top:25px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.keyrow{
    display:flex;
    justify-content:center;
    gap:6px;
}

.key{
    min-width:43px;
    height:58px;
    border:none;
    border-radius:4px;
    background:#818384;
    color:white;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

.big{
    min-width:80px;
}

.correct-key{
    background:var(--green);
}

.present-key{
    background:var(--yellow);
}

.absent-key{
    background:var(--gray);
}

@media(max-width:600px){

    .tile{
        width:52px;
        height:52px;
        font-size:26px;
    }

    .key{
        min-width:32px;
        height:48px;
        font-size:14px;
    }
}
</style>
</head>
<body>

<h1>WORDLE</h1>

<div id="message"></div>

<div id="board"></div>

<div id="keyboard"></div>

<script>

// =====================================
// CUSTOM WORDS HERE
// =====================================

const WORDS = [
    "APPLE",
    "HOUSE",
    "ROBOT",
    "MAGIC",
    "QUEST",
    "FLASK",
    "TIGER",
    "SPACE",
    "GHOST",
    "SWORD",
    "BRICK",
    "PLANT",
    "CLOUD",
    "SMILE",
    "WATER"
];

// or force one word:
// const SECRET = "APPLE";

const SECRET =
WORDS[Math.floor(Math.random()*WORDS.length)];

const WORD_LENGTH = 5;
const MAX_ROWS = 6;

let currentRow = 0;
let currentCol = 0;
let gameOver = false;

const guesses =
Array(MAX_ROWS).fill().map(
()=>Array(WORD_LENGTH).fill("")
);

const keyboardStatus = {};

const board =
document.getElementById("board");

const keyboard =
document.getElementById("keyboard");

// =====================================
// BOARD
// =====================================

for(let r=0;r<MAX_ROWS;r++){

    const row =
    document.createElement("div");

    row.className="row";

    for(let c=0;c<WORD_LENGTH;c++){

        const tile =
        document.createElement("div");

        tile.className="tile";
        tile.id=`tile-${r}-${c}`;

        row.appendChild(tile);
    }

    board.appendChild(row);
}

// =====================================
// KEYBOARD
// =====================================

const rows = [
"QWERTYUIOP",
"ASDFGHJKL",
"ENTERZXCVBNM⌫"
];

rows.forEach(rowText=>{

    const row =
    document.createElement("div");

    row.className="keyrow";

    if(rowText==="ENTERZXCVBNM⌫"){

        createKey("ENTER",row,true);

        "ZXCVBNM".split("")
        .forEach(letter=>{
            createKey(letter,row);
        });

        createKey("⌫",row,true);

    }else{

        rowText.split("")
        .forEach(letter=>{
            createKey(letter,row);
        });
    }

    keyboard.appendChild(row);
});

function createKey(text,row,big=false){

    const btn =
    document.createElement("button");

    btn.className =
    big ? "key big" : "key";

    btn.textContent = text;

    btn.id = "key-"+text;

    btn.onclick = ()=>handleKey(text);

    row.appendChild(btn);
}

// =====================================
// INPUT
// =====================================

document.addEventListener("keydown",e=>{

    if(gameOver) return;

    const key =
    e.key.toUpperCase();

    if(key==="ENTER"){
        handleKey("ENTER");
    }
    else if(key==="BACKSPACE"){
        handleKey("⌫");
    }
    else if(/^[A-Z]$/.test(key)){
        handleKey(key);
    }
});

function handleKey(key){

    if(gameOver) return;

    if(key==="ENTER"){

        submitGuess();
        return;
    }

    if(key==="⌫"){

        if(currentCol>0){

            currentCol--;

            guesses[currentRow][currentCol]="";

            updateBoard();
        }

        return;
    }

    if(currentCol<WORD_LENGTH){

        guesses[currentRow][currentCol]=key;
        currentCol++;

        updateBoard();
    }
}

// =====================================
// BOARD UPDATE
// =====================================

function updateBoard(){

    for(let r=0;r<MAX_ROWS;r++){

        for(let c=0;c<WORD_LENGTH;c++){

            document.getElementById(
            `tile-${r}-${c}`
            ).textContent =
            guesses[r][c];
        }
    }
}

// =====================================
// WORDLE LOGIC
// =====================================

function evaluateGuess(guess){

    const result =
    Array(WORD_LENGTH).fill("absent");

    const counts = {};

    // pass 1 green

    for(let i=0;i<WORD_LENGTH;i++){

        if(guess[i]===SECRET[i]){

            result[i]="correct";

        }else{

            counts[SECRET[i]] =
            (counts[SECRET[i]]||0)+1;
        }
    }

    // pass 2 yellow

    for(let i=0;i<WORD_LENGTH;i++){

        if(result[i]==="correct")
            continue;

        const letter =
        guess[i];

        if(counts[letter]>0){

            result[i]="present";
            counts[letter]--;

        }else{

            result[i]="absent";
        }
    }

    return result;
}

// =====================================
// SUBMIT
// =====================================

function submitGuess(){

    if(currentCol!==WORD_LENGTH){

        showMessage(
        "Not enough letters"
        );

        return;
    }

    const guess =
    guesses[currentRow].join("");

    const result =
    evaluateGuess(guess);

    for(let i=0;i<WORD_LENGTH;i++){

        const tile =
        document.getElementById(
        `tile-${currentRow}-${i}`
        );

        tile.classList.add(
            result[i]
        );

        updateKeyboard(
            guess[i],
            result[i]
        );
    }

    if(guess===SECRET){

        showMessage(
        "🎉 You Win!"
        );

        gameOver=true;
        return;
    }

    currentRow++;
    currentCol=0;

    if(currentRow>=MAX_ROWS){

        showMessage(
        "💀 Word was: "+SECRET
        );

        gameOver=true;
    }
}

// =====================================
// KEYBOARD COLORS
// =====================================

function updateKeyboard(letter,status){

    const priority = {
        absent:1,
        present:2,
        correct:3
    };

    if(
        !keyboardStatus[letter] ||
        priority[status] >
        priority[keyboardStatus[letter]]
    ){

        keyboardStatus[letter]=status;

        const key =
        document.getElementById(
        "key-"+letter
        );

        key.classList.remove(
            "correct-key",
            "present-key",
            "absent-key"
        );

        if(status==="correct")
            key.classList.add(
            "correct-key"
            );

        else if(status==="present")
            key.classList.add(
            "present-key"
            );

        else
            key.classList.add(
            "absent-key"
            );
    }
}

// =====================================

function showMessage(text){

    document.getElementById(
    "message"
    ).textContent=text;
}

// =====================================
// FOR TESTING
// =====================================

// console.log("SECRET:",SECRET);

</script>

</body>
</html>
